<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no"
    />
    <script>
      (() => {
        const storedTheme = localStorage.getItem('konttivahti-theme');
        const theme = ['light', 'dark', 'system'].includes(storedTheme) ? storedTheme : 'system';
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.classList.toggle(
          'dark',
          theme === 'dark' || (theme === 'system' && prefersDark),
        );
      })();
    </script>
    <!-- first-paint fallback to prevent flash -->
    <style>
      html,
      body {
        background: #fafafa;
        color: #27272a;
      }

      html.dark,
      html.dark body {
        background: #09090b;
        color: #e4e4e7;
      }
    </style>
    <title>Konttivahti</title>
  </head>
  <body class="bg-surface-0 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
